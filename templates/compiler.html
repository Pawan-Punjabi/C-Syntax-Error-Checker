{% extends "base.html" %}

{% block title %}C Syntax Checker - Compiler{% endblock %}

{% block extra_head %}
<style>
    .editor-panel {
        display: flex;
        flex-direction: column;
        height: 100%;
    }
    .editor-toolbar {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        background: #1a1f26;
        border-bottom: 1px solid #2d333b;
        flex-wrap: wrap;
    }
    .editor-container {
        flex: 1;
        position: relative;
        min-height: 300px;
    }
    .CodeMirror {
        height: 100%;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        font-size: 14px;
    }
    .results-panel {
        background: #0f1720;
    }
    .results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        background: #1a1f26;
        border-bottom: 1px solid #2d333b;
    }
    .results-title {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .error-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 24px;
        height: 24px;
        padding: 0 8px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
    }
    .error-count.success {
        background: #4ec9b0;
        color: #0b0f12;
    }
    .error-count.error {
        background: #f44747;
        color: #fff;
    }
    .error-count.warning {
        background: #dcdcaa;
        color: #0b0f12;
    }
    .results-content {
        padding: 16px;
        overflow-y: auto;
        max-height: calc(100vh - 200px);
    }
    .error-card {
        background: var(--bg-hover);
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    .error-card:hover {
        border-color: var(--accent-secondary);
        background: #1f252d;
    }
    .error-card.critical {
        border-left: 4px solid var(--error);
    }
    .error-card.warning {
        border-left: 4px solid var(--warning);
    }
    .error-card.info {
        border-left: 4px solid var(--info);
    }
    .error-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px;
        border-bottom: 1px solid var(--border);
    }
    .error-type-tag {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        padding: 2px 6px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.1);
    }
    .error-card.critical .error-type-tag { color: var(--error); background: rgba(244, 71, 71, 0.1); }
    .error-card.warning .error-type-tag { color: var(--warning); background: rgba(220, 220, 170, 0.1); }
    .error-card.info .error-type-tag { color: var(--info); background: rgba(86, 156, 214, 0.1); }
    
    .error-type {
        font-weight: 600;
        color: var(--text-primary);
        flex: 1;
        margin-left: 8px;
    }
    .error-line {
        color: var(--text-secondary);
        font-size: 12px;
    }
    .error-card-body {
        padding: 12px;
    }
    .error-message {
        color: var(--text-primary);
        font-size: 14px;
        margin-bottom: 8px;
    }
    .error-code {
        background: var(--bg-primary);
        padding: 8px 12px;
        border-radius: 4px;
        font-family: var(--font-code);
        font-size: 13px;
        color: var(--text-code);
        overflow-x: auto;
        border: 1px solid var(--border);
    }
    .no-errors {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px;
        color: #4ec9b0;
    }
    .no-errors-icon {
        font-size: 48px;
        margin-bottom: 16px;
    }
    .no-errors-text {
        font-size: 18px;
        font-weight: 600;
    }
    .editor-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        padding: 12px 16px;
        background: #1a1f26;
        border-top: 1px solid #2d333b;
    }
    .editor-info {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-left: auto;
        font-size: 12px;
        color: #8892a0;
    }
    .mobile-toolbar {
        display: none;
    }
    @media (max-width: 768px) {
        .editor-toolbar {
            display: none;
        }
        .mobile-toolbar {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #1a1f26;
            border-bottom: 1px solid #2d333b;
            flex-wrap: wrap;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="compiler-page">
    <div class="panels-container">
        <div class="editor-panel">
            <div class="mobile-toolbar">
                <button class="btn btn-secondary" id="mobileImportBtn">Import</button>
                <button class="btn btn-secondary" id="mobileClearBtn">Clear</button>
                <button class="btn btn-secondary" id="mobileSampleBtn">Sample</button>
                <button class="btn btn-primary" id="mobileCheckBtn">Check Code</button>
            </div>
            <div class="editor-toolbar">
                <button class="btn btn-secondary" id="importBtn">Import .c</button>
                <button class="btn btn-secondary" id="clearBtn">Clear</button>
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" id="sampleBtn">
                        Load Sample
                    </button>
                    <div class="dropdown-menu" id="sampleMenu">
                        <button class="dropdown-item" data-sample="good1">Valid Code</button>
                        <button class="dropdown-item" data-sample="good2">Function Example</button>
                        <button class="dropdown-item" data-sample="bad1">Invalid Variables</button>
                        <button class="dropdown-item" data-sample="bad2">Unclosed Quotes</button>
                        <button class="dropdown-item" data-sample="bad3">Keyword Typo</button>
                    </div>
                </div>
                <button class="btn btn-primary" id="checkBtn">
                    Check Code <span class="shortcut">Ctrl+Enter</span>
                </button>
                <div class="editor-info">
                    <span>Syntax: C</span>
                    <span>Dark Theme</span>
                </div>
            </div>
            <div class="editor-container">
                <textarea id="codeEditor"></textarea>
                <input type="file" id="fileInput" accept=".c" style="display: none;">
            </div>
            <div class="editor-actions">
                <button class="btn btn-secondary" id="copyBtn">Copy</button>
                <button class="btn btn-secondary" id="downloadBtn">Download .c</button>
            </div>
        </div>
        <div class="results-panel">
            <div class="results-header">
                <div class="results-title">
                    <span>Error Results</span>
                    <span class="error-count" id="errorCount" style="display: none;">0</span>
                </div>
                <button class="btn btn-secondary btn-small" id="downloadReportBtn" style="display: none;">
                    Download Report
                </button>
            </div>
            <div class="results-content" id="resultsContent">
                <div class="no-errors">
                    <div class="no-errors-icon" style="font-size: 24px; font-weight: bold; border: 2px solid; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">OK</div>
                    <div class="no-errors-text">No errors detected</div>
                    <p style="color: #8892a0; margin-top: 8px;">Enter C code and click "Check Code"</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/compiler.js') }}"></script>
{% endblock %}
